services:
  - type: web
    name: tic-tac-toe-server
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: xo-project-eosin.vercel.app  # CHANGE THIS to your actual Vercel URL
